name: Build LaTeX PDF and Attach to Release
permissions:
  contents: write
'on':
  release:
    types:
      - published
jobs:
  build-pdf:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended
      - name: Compile LaTeX to PDF
        run: |
          cd TvaerfagligtProjekt/docs
          pdflatex -interaction=nonstopmode procesrapport.tex
          pdflatex -interaction=nonstopmode procesrapport.tex
          pdflatex -interaction=nonstopmode produktrapport.tex
          pdflatex -interaction=nonstopmode produktrapport.tex
      - name: Attach procesrapport.pdf to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: '${{ github.event.release.upload_url }}'
          asset_path: TvaerfagligtProjekt/docs/procesrapport.pdf
          asset_name: procesrapport.pdf
          asset_content_type: application/pdf
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      - name: Attach produktrapport.pdf to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: '${{ github.event.release.upload_url }}'
          asset_path: TvaerfagligtProjekt/docs/produktrapport.pdf
          asset_name: produktrapport.pdf
          asset_content_type: application/pdf
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'